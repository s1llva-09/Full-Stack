<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoteca</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <header>
        <div class="logo">
            <img src="assets/Logo.png" alt="Logo memoteca">
            <h1>Trechos de músicas, citações de livros e
                <br> <strong>suas melhores ideias
                <br> num só lugar!</strong
            </h1>
        </div>

            <img src="assets/images/Imagem banner.png" alt="Colagem">
    </header>

    <main>
        <div class="overlay"><img src="assets/images/Background.png" alt="Background"></div>
        <h2>Adicione um pensamento novo:</h2>
        <section id="form-container">
            <form id="form-pensamento">
                <label for="conteudo">Pensamento</label>
                <textarea id="conteudo" placeholder="Digite seu pensamento"></textarea>

                <label for="autoria">Autor(a) ou Fonte</label>
                <input id="autoria" type="text" placeholder="Insira o nome do(a) autor(a) ou fonte." required>

                <div class="form-botoes">
                    <button>Adicionar</button>
                    <button>Cancelar</button>
                </div>
            </form>
        </section>

    </main>
</body>
</html>
