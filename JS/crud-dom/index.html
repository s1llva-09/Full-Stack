<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRUD DOM - Livros</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js" defer></script>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">CRUD DOM</p>
        <h1>Biblioteca de Livros</h1>
        <p class="subtitle">Treine listagem, cadastro, edicao e exclusao usando DOM e json-server.</p>
      </div>

      <button id="btnNovo" class="btn btn-primario" type="button">Novo Livro</button>
    </header>

    <main>
      <section class="painel">
        <div class="painel-topo">
          <div>
            <h2>Livros cadastrados</h2>
            <p class="contador" id="contadorLivros">0 livros</p>
          </div>
        </div>

        <div id="listaLivros" class="grid"></div>
      </section>
    </main>
  </div>

  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h2 id="modalTitulo">Novo Livro</h2>

      <div class="campo">
        <label for="titulo">Titulo</label>
        <input type="text" id="titulo" placeholder="Digite o titulo do livro">
      </div>

      <div class="campo">
        <label for="autor">Autor</label>
        <input type="text" id="autor" placeholder="Digite o nome do autor">
      </div>

      <div class="campo">
        <label for="ano">Ano</label>
        <input type="number" id="ano" placeholder="Digite o ano">
      </div>

      <div class="acoes">
        <button id="cancelar" class="btn btn-secundario" type="button">Cancelar</button>
        <button id="salvar" class="btn btn-primario" type="button">Salvar</button>
      </div>
    </div>
  </div>
</body>
</html>
