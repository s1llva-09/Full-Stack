<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Lista de Produtos</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="script.js" defer></script>
</head>
<body>

  <header>
    <h1>Produtos</h1>
    <button id="btnNovo">Novo Produto</button>
  </header>

  <main>
    <div id="listaProdutos" class="grid"></div>
  </main>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h2 id="modalTitulo">Novo Produto</h2>

      <input type="text" id="nome" placeholder="Nome do produto">
      <input type="number" id="preco" placeholder="Preço">

      <div class="acoes">
        <button class="btn-secundario" id="cancelar">Cancelar</button>
        <button class="btn-primario" id="salvar">Salvar</button>
      </div>
    </div>
  </div>

  
</body>
</html>
