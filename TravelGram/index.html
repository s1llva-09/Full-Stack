<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travelgram | Perfil de Viagens</title>
    <link rel="stylesheet" href="styles/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-surface-color">
    <nav class="container">
        <a href="#" id="logo">
            <img src="assets/Logo.svg" alt="Logomarca">
        </a>

        <ul class="primary-menu">
            <li><a href="">
                <img src="assets/icons/MagnifyingGlass.svg" alt="icone lupa">
            </a>
            </li>
            <li><a href="#">Explorer</a></li>
            <li><a href="#">My travels</a></li>
            <li>
                <a href="#">
                    <img src="assets/Profile pic.png" alt="profile pic">
                </a>
            </li>
        </ul>
    </nav>

    <header class="bg-sur">
        <div class="container">
            <div id="profile">
                <img src="assets/Profile pic.png" alt="Profile image">
                <div>
                    <h1>Isabela Torres</h1>
                    <p>
                        Amante de viagens, cultura e gastronomia. 🌍✈️ <br> 
                        Aqui compartilho as histórias registradas em cada clique, explorando cantinhos fascinantes do nosso planeta a partir da movimentada cidade de São Paulo. 🏙️📸
                    </p>
                </div>
            </div>

            <ul id="info">
                <li>
                    <img src="assets/icons/MapPin.svg" alt="icon map">
                    <span>São Paulo, Brazil</span>
                </li>
                <li>
                    <img src="assets/icons/AirplaneTilt.svg" alt="icon airplane">
                    <span>37 países</span>
                </li>
                <li>
                    <img src="assets/icons/Image.svg" alt="icon image">
                    <span>240 fotos</span>
                </li>
            </ul>
        </div>
    </header>
    </div>
</body>
</html>
